<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Powered Website Audit Tool — Analyze any webpage for SEO, content quality, and UX insights using Gemini AI.">
    <title>Website Audit Tool — AI-Powered Analysis</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">

        <!-- ===== Header ===== -->
        <header class="header">
            <div class="header__badge">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                </svg>
                AI-Powered Audit
            </div>
            <h1 class="header__title">Website Audit Tool</h1>
            <p class="header__subtitle">Enter a URL to extract factual metrics and generate AI-driven insights for SEO, content, and UX.</p>
        </header>

        <!-- ===== Input Section ===== -->
        <section class="input-section" id="input-section">
            <form class="input-group" id="audit-form">
                <input
                    type="text"
                    class="input-group__field"
                    id="url-input"
                    placeholder="Enter a URL — e.g. https://example.com"
                    autocomplete="url"
                    required
                >
                <button type="submit" class="btn-primary" id="audit-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                    Run Audit
                </button>
            </form>
        </section>

        <!-- ===== Error Message ===== -->
        <div class="error-message" id="error-message"></div>

        <!-- ===== Loading State ===== -->
        <div class="loading" id="loading">
            <div class="loading__spinner"></div>
            <p class="loading__text" id="loading-text">Scraping page...</p>
        </div>

        <!-- ===== Results ===== -->
        <div class="results" id="results">

            <!-- Section 1: Factual Metrics -->
            <section class="metrics-section" id="metrics-section">
                <div class="section-header">
                    <div class="section-header__icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 3v18h18"/><path d="m18 9-5 5-4-4-6 6"/>
                        </svg>
                    </div>
                    <div>
                        <p class="section-header__label">Scraped Data</p>
                        <h2 class="section-header__title">Factual Metrics</h2>
                    </div>
                </div>
                <div class="metrics-grid" id="metrics-grid">
                    <!-- Populated by JavaScript -->
                </div>
            </section>

            <!-- Section 2: AI Insights -->
            <section class="insights-section" id="insights-section">
                <div class="section-header">
                    <div class="section-header__icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4.5-3 5.7V17a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.3C6.2 13.5 5 11.4 5 9a7 7 0 0 1 7-7z"/>
                            <path d="M10 21h4"/>
                        </svg>
                    </div>
                    <div>
                        <p class="section-header__label">Gemini AI Analysis</p>
                        <h2 class="section-header__title">AI Insights</h2>
                    </div>
                </div>
                <div class="insight-blocks" id="insight-blocks">
                    <!-- Populated by JavaScript -->
                </div>
            </section>

            <!-- Section 2b: Recommendations -->
            <section class="recommendations-section" id="recommendations-section">
                <div class="section-header">
                    <div class="section-header__icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                    </div>
                    <div>
                        <p class="section-header__label">Action Items</p>
                        <h2 class="section-header__title">Recommendations</h2>
                    </div>
                </div>
                <div class="recommendation-list" id="recommendation-list">
                    <!-- Populated by JavaScript -->
                </div>
            </section>

            <!-- Section 3: Prompt Log Viewer -->
            <section class="prompt-log-section" id="prompt-log-section">
                <button class="btn-toggle" id="toggle-log-btn" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                    View Prompt Log
                </button>
                <div class="prompt-log__content" id="prompt-log-content">
                    <pre class="prompt-log__pre" id="prompt-log-pre">Loading...</pre>
                </div>
            </section>

        </div>

    </div>

    <script>
    (function() {
        'use strict';

        // ===== DOM Elements =====
        const auditForm     = document.getElementById('audit-form');
        const urlInput      = document.getElementById('url-input');
        const auditBtn      = document.getElementById('audit-btn');
        const loadingEl     = document.getElementById('loading');
        const loadingText   = document.getElementById('loading-text');
        const errorEl       = document.getElementById('error-message');
        const resultsEl     = document.getElementById('results');
        const metricsGrid   = document.getElementById('metrics-grid');
        const insightBlocks = document.getElementById('insight-blocks');
        const recoList      = document.getElementById('recommendation-list');
        const toggleLogBtn  = document.getElementById('toggle-log-btn');
        const logContent    = document.getElementById('prompt-log-content');
        const logPre        = document.getElementById('prompt-log-pre');

        // ===== Insight Labels =====
        const INSIGHT_LABELS = {
            seo_structure:          'SEO Structure',
            messaging_clarity:      'Messaging Clarity',
            cta_usage:              'CTA Usage',
            content_depth:          'Content Depth',
            ux_structural_concerns: 'UX / Structural Concerns'
        };

        // ===== Metric Labels =====
        const METRIC_CONFIG = [
            { key: 'word_count',             label: 'Word Count',          type: 'number' },
            { key: 'h1_count',               label: 'H1 Tags',            type: 'number' },
            { key: 'h2_count',               label: 'H2 Tags',            type: 'number' },
            { key: 'h3_count',               label: 'H3 Tags',            type: 'number' },
            { key: 'cta_count',              label: 'CTA Count',          type: 'number' },
            { key: 'internal_links',         label: 'Internal Links',     type: 'number' },
            { key: 'external_links',         label: 'External Links',     type: 'number' },
            { key: 'image_count',            label: 'Total Images',       type: 'number' },
            { key: 'images_missing_alt_pct', label: 'Missing Alt Text',   type: 'pct' },
            { key: 'meta_title',             label: 'Meta Title',         type: 'text',  wide: true },
            { key: 'meta_description',       label: 'Meta Description',   type: 'text',  wide: true },
        ];

        // ===== State Helpers =====
        function showLoading(text) {
            loadingText.textContent = text;
            loadingEl.classList.add('active');
            errorEl.classList.remove('active');
            resultsEl.classList.remove('active');
        }

        function hideLoading() {
            loadingEl.classList.remove('active');
        }

        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.add('active');
            hideLoading();
            resultsEl.classList.remove('active');
        }

        function clearError() {
            errorEl.classList.remove('active');
            errorEl.textContent = '';
        }

        // ===== Escape HTML =====
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ===== Render Metrics =====
        function renderMetrics(metrics) {
            metricsGrid.innerHTML = '';

            METRIC_CONFIG.forEach(function(cfg) {
                const value = metrics[cfg.key];
                const card = document.createElement('div');
                card.className = 'metric-card';

                // Add wide class for meta fields
                if (cfg.wide) {
                    card.classList.add('metric-card--wide');
                }

                // Add danger class for missing alt > 50%
                if (cfg.key === 'images_missing_alt_pct' && value > 50) {
                    card.classList.add('metric-card--danger');
                }

                const label = document.createElement('div');
                label.className = 'metric-card__label';
                label.textContent = cfg.label;

                const valueEl = document.createElement('div');

                if (cfg.type === 'number') {
                    valueEl.className = 'metric-card__value';
                    valueEl.textContent = value != null ? value.toLocaleString() : '0';
                } else if (cfg.type === 'pct') {
                    valueEl.className = 'metric-card__value';
                    valueEl.textContent = (value != null ? value : 0) + '%';
                } else {
                    // text type (meta title, meta description)
                    valueEl.className = 'metric-card__value metric-card__value--small';
                    valueEl.textContent = value || 'Not found';
                }

                card.appendChild(label);
                card.appendChild(valueEl);
                metricsGrid.appendChild(card);
            });
        }

        // ===== Render Insights =====
        function renderInsights(insights) {
            insightBlocks.innerHTML = '';

            Object.keys(INSIGHT_LABELS).forEach(function(key) {
                const block = document.createElement('div');
                block.className = 'insight-block';

                const title = document.createElement('div');
                title.className = 'insight-block__title';
                title.textContent = INSIGHT_LABELS[key];

                const content = document.createElement('div');
                content.className = 'insight-block__content';
                content.textContent = insights[key] || 'No analysis available.';

                block.appendChild(title);
                block.appendChild(content);
                insightBlocks.appendChild(block);
            });
        }

        // ===== Render Recommendations =====
        function renderRecommendations(recommendations) {
            recoList.innerHTML = '';

            recommendations.forEach(function(rec) {
                const card = document.createElement('div');
                card.className = 'recommendation-card';

                // Priority badge
                const badge = document.createElement('span');
                const priorityLower = (rec.priority || 'medium').toLowerCase();
                badge.className = 'priority-badge priority-badge--' + priorityLower;
                badge.textContent = rec.priority;

                // Body
                const body = document.createElement('div');
                body.className = 'recommendation-card__body';

                const text = document.createElement('div');
                text.className = 'recommendation-card__text';
                text.textContent = rec.recommendation;

                const reasoning = document.createElement('div');
                reasoning.className = 'recommendation-card__reasoning';
                reasoning.textContent = rec.reasoning;

                body.appendChild(text);
                body.appendChild(reasoning);
                card.appendChild(badge);
                card.appendChild(body);
                recoList.appendChild(card);
            });
        }

        // ===== Audit Form Submit =====
        auditForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const url = urlInput.value.trim();
            if (!url) {
                showError('Please enter a URL.');
                return;
            }

            clearError();
            auditBtn.disabled = true;

            // Loading state: Phase 1 — Scraping
            showLoading('Scraping page...');

            // Simulate the two-phase loading text transition
            var loadingPhase2Timer = setTimeout(function() {
                loadingText.textContent = 'Analyzing with Gemini AI...';
            }, 3000);

            fetch('/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(function(response) {
                clearTimeout(loadingPhase2Timer);
                return response.json().then(function(data) {
                    return { status: response.status, data: data };
                });
            })
            .then(function(result) {
                hideLoading();
                auditBtn.disabled = false;

                if (result.status !== 200 || result.data.error) {
                    showError(result.data.error || 'An unexpected error occurred.');
                    return;
                }

                // Render results
                renderMetrics(result.data.metrics);
                renderInsights(result.data.insights);
                renderRecommendations(result.data.recommendations);

                // Show results section
                resultsEl.classList.add('active');

                // Reset prompt log state
                toggleLogBtn.classList.remove('expanded');
                logContent.classList.remove('active');

                // Scroll to results
                document.getElementById('metrics-section').scrollIntoView({ behavior: 'smooth' });
            })
            .catch(function(err) {
                clearTimeout(loadingPhase2Timer);
                hideLoading();
                auditBtn.disabled = false;
                showError('Network error: ' + err.message);
            });
        });

        // ===== Prompt Log Toggle =====
        toggleLogBtn.addEventListener('click', function() {
            const isExpanded = toggleLogBtn.classList.contains('expanded');

            if (isExpanded) {
                // Collapse
                toggleLogBtn.classList.remove('expanded');
                logContent.classList.remove('active');
            } else {
                // Expand — fetch last log
                toggleLogBtn.classList.add('expanded');
                logContent.classList.add('active');
                logPre.textContent = 'Loading prompt log...';

                fetch('/last-log')
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    if (data.error) {
                        logPre.textContent = 'No audit logs found yet.';
                    } else {
                        logPre.textContent = JSON.stringify(data, null, 2);
                    }
                })
                .catch(function(err) {
                    logPre.textContent = 'Failed to load prompt log: ' + err.message;
                });
            }
        });

    })();
    </script>
</body>
</html>
